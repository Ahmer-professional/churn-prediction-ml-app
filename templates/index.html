<!DOCTYPE html>
<html>
<head>
    <title>Churn Prediction</title>
    <style>
body {
    font-family: Arial;
    text-align: center;
    background-color: #f2f2f2;
}
form {
    background: white;
    padding: 20px;
    margin: auto;
    width: 300px;
    border-radius: 10px;
}
</style>
</head>
<body>
    <h2>Customer Churn Prediction</h2>

    <form action="/predict_form" method="post">
        Age: <input type="number" name="age"><br><br>

        Gender:
        <select name="gender">
            <option value="1">Male</option>
            <option value="0">Female</option>
        </select><br><br>

        Tenure (months): <input type="number" name="tenure"><br><br>

        Monthly Charges: <input type="number" name="monthly_charges"><br><br>

        Contract:
        <select name="contract">
            <option value="0">Monthly</option>
            <option value="1">Yearly</option>
            <option value="2">TwoYear</option>
        </select><br><br>

        Internet Service:
        <select name="internet_service">
            <option value="0">DSL</option>
            <option value="1">Fiber</option>
        </select><br><br>

        Support Calls: <input type="number" name="support_calls"><br><br>

        Payment Method:
        <select name="payment_method">
            <option value="0">CreditCard</option>
            <option value="1">BankTransfer</option>
            <option value="2">Easypaisa</option>
            <option value="3">Cash</option>
        </select><br><br>

        <input type="submit" value="Predict">
    </form>

    <h3>{{ prediction_text }}</h3>
</body>
</html>
